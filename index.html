<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직류변환공학 OX 퀴즈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .container {
    max-width: 700px;
    width: 95%;
    margin: 20px auto;
  }

  /* 타이틀 화면 */
  #title-screen {
    text-align: center;
    padding: 60px 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .main-title {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub-title {
    font-size: 1rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 40px;
  }
  .info-box {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .info-item {
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
  }
  .info-item .num { font-size: 1.8rem; font-weight: 700; color: #00d2ff; }
  .info-item .label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .start-btn {
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 60px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(0,210,255,0.3); }

  /* 퀴즈 화면 */
  #quiz-screen { display: none; }
  .progress-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .progress-text { font-size: 0.85rem; color: rgba(255,255,255,0.6); white-space: nowrap; }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00d2ff, #7b2ff7);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .score-chip {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .score-chip span { color: #00d2ff; font-weight: 700; }

  .question-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 24px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .question-tag {
    font-size: 0.72rem;
    color: #00d2ff;
    background: rgba(0,210,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    display: inline-block;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  .question-text {
    font-size: 1.1rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.95);
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .answer-btn {
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 24px;
    font-size: 1.8rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .answer-btn .btn-label { font-size: 0.85rem; font-weight: 500; }
  .answer-btn:hover { transform: scale(1.03); border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }
  .btn-o { --accent: #22c55e; }
  .btn-x { --accent: #ef4444; }
  .answer-btn:hover { border-color: var(--accent); color: var(--accent); }

  .answer-btn.correct {
    background: rgba(34,197,94,0.2);
    border-color: #22c55e;
    color: #22c55e;
    transform: scale(1.03);
  }
  .answer-btn.wrong {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
    color: #ef4444;
  }
  .answer-btn:disabled { cursor: default; }

  .explanation-box {
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    line-height: 1.7;
    display: none;
    animation: slideUp 0.3s ease;
  }
  .explanation-box.correct-exp {
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    color: rgba(255,255,255,0.9);
  }
  .explanation-box.wrong-exp {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: rgba(255,255,255,0.9);
  }
  .exp-title {
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
  }
  .exp-title.c { color: #22c55e; }
  .exp-title.w { color: #ef4444; }

  .next-btn {
    width: 100%;
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s;
  }
  .next-btn:hover { opacity: 0.9; }

  /* 결과 화면 */
  #result-screen {
    display: none;
    text-align: center;
    padding: 50px 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .result-emoji { font-size: 4rem; margin-bottom: 16px; }
  .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
  .result-subtitle { color: rgba(255,255,255,0.55); margin-bottom: 32px; font-size: 0.95rem; }
  .result-score-big {
    font-size: 4.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-score-label { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 32px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .stat { background: rgba(255,255,255,0.07); border-radius: 14px; padding: 16px 28px; }
  .stat .snum { font-size: 1.5rem; font-weight: 700; }
  .stat .slabel { font-size: 0.72rem; color: rgba(255,255,255,0.45); margin-top: 4px; }
  .stat.green .snum { color: #22c55e; }
  .stat.red .snum { color: #ef4444; }
  .retry-btn {
    background: linear-gradient(135deg, #00d2ff, #7b2ff7);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .retry-btn:hover { transform: scale(1.04); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    60% { transform: translateX(8px); }
  }
</style>
</head>
<body>
<div class="container">

  <!-- 타이틀 -->
  <div id="title-screen">
    <div class="main-title">직류변환공학</div>
    <div class="main-title" style="font-size:1.5rem; margin-top:-4px;">OX 퀴즈</div>
    <div class="sub-title">Hanyang University ERICA · SPEC Lab</div>
    <div class="info-box">
      <div class="info-item"><div class="num">20</div><div class="label">총 문제</div></div>
      <div class="info-item"><div class="num">CH1·2</div><div class="label">출제 범위</div></div>
      <div class="info-item"><div class="num">랜덤</div><div class="label">문제 순서</div></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">시작하기</button>
  </div>

  <!-- 퀴즈 -->
  <div id="quiz-screen">
    <div class="progress-area">
      <div class="progress-text" id="progress-text">1 / 20</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:5%"></div>
      </div>
      <div class="score-chip">점수 <span id="score-disp">0</span></div>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-tag" id="q-tag">개념</div>
      <div class="question-text" id="q-text"></div>
    </div>

    <div class="btn-row">
      <button class="answer-btn btn-o" id="btn-o" onclick="answer(true)">
        O
        <span class="btn-label">맞다</span>
      </button>
      <button class="answer-btn btn-x" id="btn-x" onclick="answer(false)">
        X
        <span class="btn-label">틀리다</span>
      </button>
    </div>

    <div class="explanation-box" id="exp-box">
      <div class="exp-title" id="exp-title"></div>
      <div id="exp-text"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- 결과 -->
  <div id="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">훌륭해요!</div>
    <div class="result-subtitle" id="result-sub"></div>
    <div class="result-score-big" id="result-big">0점</div>
    <div class="result-score-label">20문제 중</div>
    <div class="result-stats">
      <div class="stat green"><div class="snum" id="r-correct">0</div><div class="slabel">정답</div></div>
      <div class="stat red"><div class="snum" id="r-wrong">0</div><div class="slabel">오답</div></div>
      <div class="stat"><div class="snum" id="r-rate">0%</div><div class="slabel">정답률</div></div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">다시 풀기</button>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  {
    text: "전력전자 회로는 반도체 소자를 스위치로 사용하여 전기에너지를 변환한다.",
    answer: true,
    tag: "전력전자 개요",
    exp: "전력전자 회로는 반도체 소자를 ON/OFF 스위치로 사용해 전압·전류를 변환·제어합니다. 이때 에너지는 변환되지만 이상적인 스위치는 전력 손실이 없습니다."
  },
  {
    text: "전압 분배기(Voltage Divider)를 이용한 DC 변환은 효율이 매우 높아 전력변환에 적합하다.",
    answer: false,
    tag: "전력전자 개요",
    exp: "전압 분배기는 저항에서 열로 에너지가 소모되어 효율이 매우 낮습니다(예: 9V → 3V 변환 시 약 33%). 반도체 스위치 방식은 이론적으로 100% 효율을 달성할 수 있습니다."
  },
  {
    text: "스위칭 회로에서 듀티비(Duty Cycle)를 1/3으로 설정하면 9V 전원으로부터 평균 3V를 얻을 수 있다.",
    answer: true,
    tag: "스위칭 회로",
    exp: "평균 전압 = 입력 전압 × 듀티비. 9V × (1/3) = 3V가 됩니다. 이것이 DC/DC 컨버터의 기본 원리입니다."
  },
  {
    text: "이상적인 스위치는 ON 상태에서 전압이 0, OFF 상태에서 전류가 0이므로 소비 전력이 0이다.",
    answer: true,
    tag: "전자 스위치",
    exp: "P = V × I이므로, ON 시 V_sw = 0 → P = 0, OFF 시 I_sw = 0 → P = 0. 이상적 스위치는 에너지를 소모하지 않아 효율 100%입니다."
  },
  {
    text: "다이오드는 게이트 신호로 ON/OFF를 완전히 제어할 수 있는 능동 스위치이다.",
    answer: false,
    tag: "전자 스위치",
    exp: "다이오드는 비제어(Uncontrollable) 스위치로, 회로의 전압·전류 조건에 의해 자동으로 ON/OFF가 결정됩니다. 게이트가 없으며, 순방향 바이어스 시 ON, 역방향 바이어스 시 OFF가 됩니다."
  },
  {
    text: "사이리스터(SCR)는 게이트 신호로 턴온은 제어할 수 있지만, 턴오프는 제어하기 어렵다.",
    answer: true,
    tag: "전자 스위치",
    exp: "SCR은 게이트 전류로 턴온을 시키지만, 애노드 전류가 유지 레벨 이상이면 게이트 신호 없이도 계속 도통합니다. 턴오프는 선전압(line voltage)에 의해 자연적으로 이루어집니다."
  },
  {
    text: "MOSFET은 전압 제어 소자로, 게이트-소스 전압(V_GS)으로 ON/OFF를 제어한다.",
    answer: true,
    tag: "전자 스위치",
    exp: "MOSFET은 전압 제어 소자입니다. 충분한 V_GS를 인가하면 드레인-소스 간이 도통됩니다. 전류 제어 소자인 BJT와 구분되는 핵심 특징입니다."
  },
  {
    text: "IGBT는 MOSFET과 BJT의 특성을 결합한 소자로, MOSFET보다 높은 스위칭 주파수로 동작한다.",
    answer: false,
    tag: "전자 스위치",
    exp: "IGBT는 구동 회로는 MOSFET과 유사하지만, ON 상태 특성은 BJT와 유사합니다. 스위칭 주파수는 MOSFET보다 낮은 약 20kHz 수준이며, 대신 고전압·대전류(최대 6.5kV, 4kA)에 적합합니다."
  },
  {
    text: "SiC MOSFET은 Si MOSFET보다 역회복 시간(Reverse Recovery Time)이 짧아 스위칭 손실이 작다.",
    answer: true,
    tag: "전자 스위치",
    exp: "강의 자료의 비교표에서 SiC MOSFET(22.2ns)은 Si MOSFET(208ns)보다 약 10배 짧은 역회복 시간을 가집니다. 이는 더 낮은 스위칭 손실을 의미합니다."
  },
  {
    text: "순시전력(Instantaneous Power)은 전압과 전류의 곱으로 정의되며, p(t) = v(t) × i(t)이다.",
    answer: true,
    tag: "전력 계산",
    exp: "순시전력의 정의입니다. 단위는 와트[W] = 볼트[V] × 암페어[A]입니다. 이를 한 주기 T 동안 평균한 것이 평균전력(Average Power)입니다."
  },
  {
    text: "주기적인 전류가 흐르는 인덕터의 평균 흡수 전력은 0이다.",
    answer: true,
    tag: "전력 계산",
    exp: "주기적인 전류에서 인덕터의 저장 에너지는 주기 시작과 끝이 같아 순 에너지 이동(Net Energy Transfer)이 0입니다. 따라서 평균 전력 P_L = 0. 이를 Volt-Second Balance라고도 합니다."
  },
  {
    text: "주기적인 전압이 걸리는 커패시터를 흐르는 평균 전류는 0이다.",
    answer: true,
    tag: "전력 계산",
    exp: "커패시터에서도 동일하게, 주기적인 전압에서 저장 에너지가 주기 시작과 끝에서 같으므로 평균 전류 I_C = 0입니다. 이를 Amp-Second(Charge) Balance라 합니다."
  },
  {
    text: "DC 전압원의 평균 흡수 전력은 DC 전압과 전류의 RMS값의 곱이다.",
    answer: false,
    tag: "전력 계산",
    exp: "DC 전압원의 평균 흡수 전력은 P_dc = V_dc × I_avg 입니다. DC 전압원에는 평균 전류(I_avg)를 사용해야 하며, RMS 전류가 아닙니다."
  },
  {
    text: "실효값(RMS)은 같은 저항에서 동일한 평균 전력을 전달하는 DC값으로 정의된다.",
    answer: true,
    tag: "실효값 RMS",
    exp: "RMS(Root Mean Square)는 실제 저항에 공급하는 평균 전력이 DC일 때와 동일하도록 정의된 유효값입니다. V_rms = sqrt(1/T × ∫v²dt)로 계산됩니다."
  },
  {
    text: "정현파 v(t) = Vm sin(ωt)의 RMS 전압은 Vm/√2이다.",
    answer: true,
    tag: "실효값 RMS",
    exp: "정현파와 전파 정류파의 RMS값은 V_rms = Vm/√2 ≈ 0.707Vm입니다. 예를 들어, 220V 가정용 전압은 최대값이 약 311V입니다."
  },
  {
    text: "듀티비 D를 가지는 구형파의 RMS값은 Vm × √D이다.",
    answer: true,
    tag: "실효값 RMS",
    exp: "듀티비 D인 구형파는 V_rms = sqrt(1/T × ∫₀^DT Vm² dt) = Vm√D 입니다. D=1이면 V_rms = Vm(DC), D=1/3이면 V_rms = Vm/√3 입니다."
  },
  {
    text: "반파 정류된 정현파의 RMS값은 전파 정류 정현파의 RMS값과 같다.",
    answer: false,
    tag: "실효값 RMS",
    exp: "전파 정류: V_rms = Vm/√2, 반파 정류: V_rms = Vm/2 입니다. 반파는 전류가 절반 주기만 흐르므로 RMS값이 더 작습니다."
  },
  {
    text: "서로 다른 주파수를 가진 두 정현파의 곱을 한 주기 동안 평균하면 0이 된다.",
    answer: true,
    tag: "비정현파 전력",
    exp: "다른 주파수의 정현파는 서로 직교(Orthogonal)합니다. 따라서 곱의 평균이 0이 되어, 평균 전력은 같은 주파수 성분끼리만 기여합니다. 이것이 비정현파 전력 계산의 핵심입니다."
  },
  {
    text: "전력인수(Power Factor)는 유효전력을 피상전력으로 나눈 값이며, 항상 cos(θ)와 같다.",
    answer: false,
    tag: "전력인수",
    exp: "선형 회로(정현파)에서는 pf = cos(θ-φ)이지만, 비선형 부하에서는 pf = DF × DPF입니다. 여기서 DF는 왜형률(Distortion Factor), DPF는 기본파 변위 전력인수입니다. 비선형 부하에서는 고조파로 인해 pf < DPF입니다."
  },
  {
    text: "총 고조파 왜형률(THD)이 클수록 왜형률 계수(Distortion Factor, DF)는 작아진다.",
    answer: true,
    tag: "비정현파 전력",
    exp: "DF = 1/√(1+THD²) 이므로, THD가 증가할수록 DF는 감소합니다. THD=0이면 DF=1(순수 정현파), THD가 커질수록 DF→0에 가까워집니다."
  }
];

let questions = [];
let current = 0;
let score = 0;
let wrong = 0;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  questions = shuffle([...ALL_QUESTIONS]);
  current = 0; score = 0; wrong = 0;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progress-text').textContent = `${current+1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((current+1)/total)*100}%`;
  document.getElementById('score-disp').textContent = score;
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-text').textContent = q.text;

  const expBox = document.getElementById('exp-box');
  expBox.style.display = 'none';
  expBox.className = 'explanation-box';

  const btnO = document.getElementById('btn-o');
  const btnX = document.getElementById('btn-x');
  btnO.disabled = false; btnX.disabled = false;
  btnO.className = 'answer-btn btn-o';
  btnX.className = 'answer-btn btn-x';

  document.getElementById('next-btn').style.display = 'none';
}

function answer(userAnswer) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const correct = (userAnswer === q.answer);

  const btnO = document.getElementById('btn-o');
  const btnX = document.getElementById('btn-x');
  btnO.disabled = true; btnX.disabled = true;

  if (correct) {
    score++;
    document.getElementById('score-disp').textContent = score;
    if (userAnswer === true) {
      btnO.classList.add('correct');
    } else {
      btnX.classList.add('correct');
    }
  } else {
    wrong++;
    if (userAnswer === true) {
      btnO.classList.add('wrong');
      btnX.classList.add('correct');
    } else {
      btnX.classList.add('wrong');
      btnO.classList.add('correct');
    }
    document.getElementById('question-card').classList.add('shake');
    setTimeout(() => document.getElementById('question-card').classList.remove('shake'), 500);
  }

  const expBox = document.getElementById('exp-box');
  const expTitle = document.getElementById('exp-title');
  expBox.style.display = 'block';

  if (correct) {
    expBox.classList.add('correct-exp');
    expTitle.className = 'exp-title c';
    expTitle.textContent = '✓ 정답입니다!';
  } else {
    expBox.classList.add('wrong-exp');
    expTitle.className = 'exp-title w';
    expTitle.textContent = '✗ 오답입니다. 정답: ' + (q.answer ? 'O' : 'X');
  }
  document.getElementById('exp-text').textContent = q.exp;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = current < questions.length - 1 ? '다음 문제 →' : '결과 보기 →';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = questions.length;
  const rate = Math.round((score / total) * 100);

  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-rate').textContent = rate + '%';
  document.getElementById('result-big').textContent = score + '점';

  let emoji, title, sub;
  if (rate >= 90) { emoji = '🏆'; title = '완벽해요!'; sub = '직류변환공학 마스터 달성!'; }
  else if (rate >= 70) { emoji = '🎉'; title = '훌륭해요!'; sub = '전력전자를 잘 이해하고 있어요.'; }
  else if (rate >= 50) { emoji = '📚'; title = '조금 더 공부해요!'; sub = '개념을 다시 한번 복습해보세요.'; }
  else { emoji = '💪'; title = '다시 도전!'; sub = '강의 자료를 다시 보고 도전해봐요.'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
}

function retryQuiz() {
  startQuiz();
}
</script>
