<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직류변환공학 OX 퀴즈</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.container { max-width: 720px; width: 95%; margin: 20px auto; }

/* 공통 카드 */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 40px 32px;
}

/* 타이틀 */
#title-screen { text-align: center; }
.main-title {
  font-size: 2.2rem; font-weight: 700; margin-bottom: 4px;
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.sub-title { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 40px; }

/* 챕터 선택 */
.chapter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; }
.ch-btn {
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 22px 10px;
  cursor: pointer;
  color: #fff;
  text-align: center;
  transition: all 0.2s;
}
.ch-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.4); transform: translateY(-2px); }
.ch-btn.selected {
  border-color: #00d2ff;
  background: rgba(0,210,255,0.12);
  box-shadow: 0 0 0 2px rgba(0,210,255,0.3);
}
.ch-num { font-size: 1.6rem; font-weight: 700; color: #00d2ff; }
.ch-name { font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-top: 6px; line-height: 1.4; }
.ch-count { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 4px; }

.btn-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.start-btn {
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  color: #fff; border: none; border-radius: 50px;
  padding: 15px 60px; font-size: 1.05rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; opacity: 0.4; pointer-events: none;
}
.start-btn.active { opacity: 1; pointer-events: auto; }
.start-btn.active:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(0,210,255,0.3); }
.hard-btn {
  background: transparent;
  color: rgba(255,255,255,0.5);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 11px 32px; font-size: 0.88rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 7px;
}
.hard-btn:hover { border-color: #f97316; color: #f97316; background: rgba(249,115,22,0.08); transform: scale(1.03); }

/* 퀴즈 화면 */
#quiz-screen { display: none; position: relative; }
.top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.back-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.7);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.progress-text { font-size: 0.82rem; color: rgba(255,255,255,0.5); white-space: nowrap; }
.progress-bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg,#00d2ff,#7b2ff7); border-radius: 3px; transition: width 0.4s ease; }
.score-chip { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; white-space: nowrap; }
.score-chip span { color: #00d2ff; font-weight: 700; }
.chapter-badge {
  font-size: 0.68rem; color: #7b2ff7;
  background: rgba(123,47,247,0.18);
  border-radius: 20px; padding: 3px 10px; white-space: nowrap;
}

.question-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 20px;
  min-height: 150px;
  display: flex; flex-direction: column; justify-content: center;
}
.question-tag {
  font-size: 0.7rem; color: #00d2ff;
  background: rgba(0,210,255,0.12);
  border-radius: 20px; padding: 3px 10px;
  display: inline-block; margin-bottom: 14px;
}
.question-text { font-size: 1.05rem; line-height: 1.75; color: rgba(255,255,255,0.95); }

.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.answer-btn {
  border: 2px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.05);
  border-radius: 16px; padding: 22px;
  font-size: 1.8rem; font-weight: 700;
  cursor: pointer; color: #fff;
  transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.answer-btn .btn-label { font-size: 0.82rem; font-weight: 500; }
.btn-o:hover { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,0.08); }
.btn-x:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.08); }
.answer-btn.correct { background: rgba(34,197,94,0.18); border-color: #22c55e; color: #22c55e; }
.answer-btn.wrong { background: rgba(239,68,68,0.18); border-color: #ef4444; color: #ef4444; }
.answer-btn:disabled { cursor: default; }

.explanation-box {
  border-radius: 14px; padding: 16px 18px; margin-bottom: 16px;
  font-size: 0.88rem; line-height: 1.7; display: none;
  animation: slideUp 0.3s ease;
}
.explanation-box.correct-exp { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.28); }
.explanation-box.wrong-exp { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.28); }
.exp-title { font-weight: 700; margin-bottom: 6px; font-size: 0.82rem; }
.exp-title.c { color: #22c55e; }
.exp-title.w { color: #ef4444; }

.next-btn {
  width: 100%;
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  color: #fff; border: none; border-radius: 12px;
  padding: 13px; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; display: none; transition: opacity 0.2s;
}
.next-btn:hover { opacity: 0.88; }

/* 결과 */
#result-screen { display: none; text-align: center; }
.result-emoji { font-size: 3.5rem; margin-bottom: 14px; }
.result-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
.result-subtitle { color: rgba(255,255,255,0.5); margin-bottom: 28px; font-size: 0.9rem; }
.result-score-big {
  font-size: 4rem; font-weight: 700; line-height: 1;
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 4px;
}
.result-score-label { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 28px; }
.result-stats { display: flex; justify-content: center; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.07); border-radius: 14px; padding: 14px 24px; }
.stat .snum { font-size: 1.4rem; font-weight: 700; }
.stat .slabel { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 3px; }
.stat.green .snum { color: #22c55e; }
.stat.red .snum { color: #ef4444; }
.result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.retry-btn, .home-btn {
  border: none; border-radius: 50px;
  padding: 13px 36px; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: transform 0.2s;
}
.retry-btn { background: linear-gradient(135deg,#00d2ff,#7b2ff7); color: #fff; }
.home-btn { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.2); }
.retry-btn:hover, .home-btn:hover { transform: scale(1.04); }

@keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 60%{transform:translateX(7px)} }
</style>
</head>
<body>
<div class="container">

<!-- 타이틀 -->
<div id="title-screen" class="card">
  <div class="main-title">직류변환공학</div>
  <div class="main-title" style="font-size:1.4rem;margin-top:-2px;">OX 퀴즈</div>
  <div class="sub-title">Hanyang University ERICA · SPEC Lab · 챕터를 선택하세요</div>
  <div class="chapter-grid">
    <div class="ch-btn" onclick="selectChapter(1)">
      <div class="ch-num">CH1</div>
      <div class="ch-name">전력전자 개요 &amp; 전자 스위치</div>
      <div class="ch-count">30문제</div>
    </div>
    <div class="ch-btn" onclick="selectChapter(2)">
      <div class="ch-num">CH2</div>
      <div class="ch-name">전력 계산 &amp; RMS &amp; 비정현파</div>
      <div class="ch-count">30문제</div>
    </div>
    <div class="ch-btn" onclick="selectChapter(3)">
      <div class="ch-num">CH3</div>
      <div class="ch-name">반파 정류기 회로 분석</div>
      <div class="ch-count">30문제</div>
    </div>
    <div class="ch-btn" onclick="selectChapter(4)">
      <div class="ch-num">CH4</div>
      <div class="ch-name">전파 정류기 회로 분석</div>
      <div class="ch-count">30문제</div>
    </div>
  </div>
  <div class="btn-area">
    <button class="start-btn" id="start-btn" onclick="startQuiz()">시작하기</button>
    <button class="hard-btn" onclick="startHardQuiz()">&#x1F525; 어려운 랜덤퀴즈</button>
  </div>
</div>

<!-- 퀴즈 -->
<div id="quiz-screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">← 챕터 선택</button>
    <div class="progress-text" id="progress-text">1 / 30</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:3%"></div></div>
    <div class="score-chip">점수 <span id="score-disp">0</span></div>
    <div class="chapter-badge" id="ch-badge">CH1</div>
  </div>
  <div class="question-card" id="question-card">
    <div class="question-tag" id="q-tag">개념</div>
    <div class="question-text" id="q-text"></div>
  </div>
  <div class="btn-row">
    <button class="answer-btn btn-o" id="btn-o" onclick="answer(true)">O<span class="btn-label">맞다</span></button>
    <button class="answer-btn btn-x" id="btn-x" onclick="answer(false)">X<span class="btn-label">틀리다</span></button>
  </div>
  <div class="explanation-box" id="exp-box">
    <div class="exp-title" id="exp-title"></div>
    <div id="exp-text"></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- 결과 -->
<div id="result-screen" class="card">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">훌륭해요!</div>
  <div class="result-subtitle" id="result-sub"></div>
  <div class="result-score-big" id="result-big">0점</div>
  <div class="result-score-label" id="result-label">30문제 중</div>
  <div class="result-stats">
    <div class="stat green"><div class="snum" id="r-correct">0</div><div class="slabel">정답</div></div>
    <div class="stat red"><div class="snum" id="r-wrong">0</div><div class="slabel">오답</div></div>
    <div class="stat"><div class="snum" id="r-rate">0%</div><div class="slabel">정답률</div></div>
  </div>
  <div class="result-btns">
    <button class="home-btn" onclick="goHome()">챕터 선택으로</button>
    <button class="retry-btn" onclick="retryQuiz()">다시 풀기</button>
  </div>
</div>

</div>
<script>
// ===================== 문제 데이터 =====================
const QUESTIONS = {
  1: [
    { text:"전력전자 회로는 반도체 소자를 스위치로 사용하여 전기에너지를 변환한다.", answer:true, tag:"전력전자 개요", exp:"전력전자 회로는 반도체 소자를 ON/OFF 스위치로 이용해 전압·전류를 변환·제어합니다. 이상적인 스위치에서는 에너지 손실이 없습니다." },
    { text:"전압 분배기(Voltage Divider)를 이용한 DC 변환은 효율이 높아 전력변환에 적합하다.", answer:false, tag:"전력전자 개요", exp:"전압 분배기는 저항에서 열로 에너지가 소모되어 효율이 매우 낮습니다. 9V→3V 변환 시 약 33% 효율에 불과합니다." },
    { text:"전력전자 설계에는 회로이론, 제어이론, 전자기학, 마이크로프로세서, 열전달이 모두 포함된다.", answer:true, tag:"전력전자 개요", exp:"강의자료에 명시된 대로 전력변환 설계는 전기공학, 회로이론, 제어이론, 전자공학, 전자기학, 마이크로프로세서, 열전달을 포함하는 복합 학문입니다." },
    { text:"AC→DC 변환기를 인버터(Inverter)라고 한다.", answer:false, tag:"컨버터 분류", exp:"AC→DC는 정류기(Rectifier)입니다. 인버터(Inverter)는 DC→AC 변환기입니다. 예: 12V 배터리로 220V 60Hz를 만드는 것이 인버터입니다." },
    { text:"DC→DC 컨버터는 비조정 DC 입력에서 조정된 DC 출력을 생성한다.", answer:true, tag:"컨버터 분류", exp:"DC/DC 컨버터의 역할입니다. 예: 12V 배터리에서 5V를 만드는 것이 DC/DC 컨버터입니다." },
    { text:"AC→AC 컨버터는 반드시 DC를 거쳐 변환해야 하므로 멀티스텝 변환이 필요하다.", answer:true, tag:"컨버터 분류", exp:"AC를 직접 다른 AC로 바꾸기 어려워 AC/DC + DC/AC 멀티스텝 변환 방식을 사용합니다." },
    { text:"스위칭 회로에서 듀티비(Duty Cycle) 1/3으로 설정하면 9V 전원으로부터 평균 3V를 얻을 수 있다.", answer:true, tag:"스위칭 회로", exp:"평균 전압 = 입력 전압 × 듀티비 = 9V × 1/3 = 3V입니다. 한 주기 T 중 T/3 시간만 스위치를 켜면 됩니다." },
    { text:"이상적인 스위치는 ON 상태에서 전압이 0, OFF 상태에서 전류가 0이므로 소비 전력이 항상 0이다.", answer:true, tag:"전자 스위치", exp:"P = V × I이므로 ON시 V=0→P=0, OFF시 I=0→P=0입니다. 이상적 스위치는 에너지를 소모하지 않아 효율 100%입니다." },
    { text:"실제 스위치의 스위칭 손실은 ON→OFF 또는 OFF→ON 천이 구간에서 발생한다.", answer:true, tag:"전자 스위치", exp:"실제 스위치는 천이 시간이 수 ns~ms이며, 이 구간에서 전압과 전류가 동시에 존재하여 스위칭 손실이 발생합니다." },
    { text:"다이오드는 게이트 신호로 ON/OFF를 완전히 제어할 수 있는 능동 스위치이다.", answer:false, tag:"다이오드", exp:"다이오드는 비제어(Uncontrollable) 스위치로, 회로의 전압·전류 조건에 의해 자동으로 ON/OFF가 결정됩니다. 게이트 단자가 없습니다." },
    { text:"다이오드의 순방향 바이어스 상태에서 이상적으로는 단락회로(Short Circuit)로 동작한다.", answer:true, tag:"다이오드", exp:"이상 다이오드는 순방향 바이어스 시 단락(V=0), 역방향 바이어스 시 개방(I=0)으로 동작합니다." },
    { text:"다이오드의 역회복(Reverse Recovery) 현상은 다이오드가 턴온될 때 발생한다.", answer:false, tag:"다이오드", exp:"역회복(Reverse Recovery)은 다이오드가 턴오프될 때 발생합니다. 전류가 감소하다가 잠시 음수가 된 후 0이 되는 현상으로, 다이오드의 주요 스위칭 손실 원인입니다." },
    { text:"SiC 다이오드는 Si 다이오드보다 총 전하량(Total Charge)이 훨씬 작아 스위칭 손실이 적다.", answer:true, tag:"다이오드", exp:"강의자료 비교표에서 Si 다이오드(2630nC) vs SiC 다이오드(154nC)로 SiC가 약 17배 적은 총 전하량을 가져 역회복 손실이 훨씬 작습니다." },
    { text:"사이리스터(SCR)는 게이트 신호로 턴온과 턴오프 모두 제어할 수 있다.", answer:false, tag:"사이리스터", exp:"SCR은 게이트 신호로 턴온은 제어할 수 있지만, 턴오프는 제어하기 어렵습니다. 애노드 전류가 유지 레벨 이상이면 계속 도통합니다. GTO는 턴오프도 가능합니다." },
    { text:"사이리스터(SCR)는 턴온 후 게이트 전류를 제거해도 애노드 전류가 유지 레벨 이상이면 계속 도통한다.", answer:true, tag:"사이리스터", exp:"SCR의 중요한 특성입니다. 도통이 시작되면 게이트 신호 없이도 애노드 전류가 유지 레벨(Holding Level) 이상인 한 계속 도통합니다." },
    { text:"MOSFET은 전류 제어 소자로, 충분한 베이스 전류를 공급하면 턴온된다.", answer:false, tag:"MOSFET", exp:"MOSFET은 전압 제어 소자입니다. 게이트-소스 전압(V_GS)으로 제어합니다. 전류 제어 소자는 BJT입니다." },
    { text:"MOSFET은 구조적으로 기생 바디 다이오드(Body Diode)를 내장하고 있어 전력전자 회로에서 유리하다.", answer:true, tag:"MOSFET", exp:"MOSFET 내부에는 기생 바디 다이오드가 존재합니다. 이를 프리휠링 다이오드로 활용할 수 있어 전력전자 회로 설계에 유리합니다." },
    { text:"MOSFET의 ON 상태에서 드레인-소스 전압(V_DS)은 드레인 전류(I_D)에 선형 비례한다.", answer:true, tag:"MOSFET", exp:"ON 상태에서 R_DSon = V_DS / I_D로 정의됩니다. R_DSon이 작을수록 도통 손실이 적습니다." },
    { text:"Si MOSFET은 SiC MOSFET보다 최대 드레인-소스 전압(V_DS max)이 더 높다.", answer:false, tag:"MOSFET", exp:"강의자료의 비교표에서 두 소자 모두 650V로 동일합니다. SiC의 주요 장점은 빠른 스위칭과 낮은 스위칭 손실입니다." },
    { text:"SiC MOSFET은 Si MOSFET보다 턴온 지연시간(Turn-on Delay Time)이 훨씬 짧다.", answer:true, tag:"MOSFET", exp:"강의자료 비교표에서 Si MOSFET(54ns) vs SiC MOSFET(7ns)으로 SiC가 약 8배 빠른 턴온 지연시간을 가집니다." },
    { text:"BJT(Bipolar Junction Transistor)는 전류 제어 소자로 베이스 전류로 동작을 제어한다.", answer:true, tag:"BJT", exp:"BJT는 전류 제어 소자입니다. 충분한 베이스 전류를 공급하여 포화 상태로 만들어 턴온합니다. 베이스 전류를 0으로 하면 턴오프됩니다." },
    { text:"Power BJT의 hFE(전류증폭률)는 매우 높아 작은 베이스 전류로 큰 컬렉터 전류를 제어할 수 있다.", answer:false, tag:"BJT", exp:"Power BJT의 hFE는 약 20으로 낮습니다. 60A의 컬렉터 전류를 위해 3A 이상의 베이스 전류가 필요합니다." },
    { text:"현재 신규 전력전자 응용에서 Power BJT는 MOSFET과 IGBT에 의해 대체되어 거의 사용되지 않는다.", answer:true, tag:"BJT", exp:"강의자료에 명시된 내용입니다. Power BJT는 MOSFET과 IGBT의 발전으로 신규 응용에서는 거의 사용되지 않습니다." },
    { text:"IGBT는 MOSFET의 구동 회로 특성과 BJT의 ON 상태 특성을 결합한 소자이다.", answer:true, tag:"IGBT", exp:"IGBT는 MOSFET처럼 전압으로 구동하고, ON 상태 특성은 BJT와 유사합니다. 고전압·대전류 응용에 적합합니다." },
    { text:"IGBT는 MOSFET보다 더 높은 스위칭 주파수로 동작할 수 있다.", answer:false, tag:"IGBT", exp:"IGBT의 스위칭 주파수는 약 20kHz 수준으로 MOSFET(~1.2MHz)보다 낮습니다. 대신 IGBT는 최대 6.5kV, 4kA의 고전압·대전류를 처리할 수 있습니다." },
    { text:"Buck 컨버터의 출력 전압은 V_o = V_s × D이다. (D: 듀티비)", answer:true, tag:"컨버터 공식", exp:"Buck(강압) 컨버터의 기본 공식입니다. D가 0~1 사이이므로 출력이 항상 입력보다 낮습니다." },
    { text:"Boost 컨버터의 출력 전압은 V_o = V_s × (1-D)이다.", answer:false, tag:"컨버터 공식", exp:"Boost(승압) 컨버터의 공식은 V_o = V_s / (1-D)입니다. D가 증가할수록 출력 전압이 높아집니다." },
    { text:"고주파 스위칭을 사용하면 필터(L, C)의 크기를 줄일 수 있다.", answer:true, tag:"스위칭 회로", exp:"스위칭 주파수가 높을수록 같은 차단 주파수를 달성하기 위해 필요한 L, C 값이 작아져 소형화가 가능합니다." },
    { text:"피드백 제어를 사용하면 부하 변동에 관계없이 일정한 출력 전압을 유지할 수 있다.", answer:true, tag:"스위칭 회로", exp:"피드백(Feedback) 제어는 출력 전압을 측정하여 듀티비를 조정함으로써 부하 변동에도 일정한 출력을 유지합니다." },
    { text:"MOSFET의 R_DSon은 온도가 높아질수록 감소한다.", answer:false, tag:"MOSFET", exp:"R_DSon은 온도가 높아질수록 증가합니다. 온도 상승 시 도통 손실이 증가합니다." },
    { text:"EV 충전기, 휴대폰 충전기, PC 전원공급장치는 모두 정류기(Rectifier) 응용의 예이다.", answer:true, tag:"전력전자 개요", exp:"이 기기들은 모두 AC 전원을 DC로 변환하는 정류기(Rectifier, AC→DC)를 포함하고 있습니다. 강의자료에 명시된 예시입니다." },
  ],
  2: [
    { text:"순시전력(Instantaneous Power)은 p(t) = v(t) × i(t)로 정의된다.", answer:true, tag:"전력 계산", exp:"순시전력의 정의입니다. 단위는 와트[W] = 볼트[V] × 암페어[A]입니다." },
    { text:"수동 부호 규약(Passive Sign Convention)에서 전류가 + 단자로 들어가고 p>0이면 전력 공급을 의미한다.", answer:false, tag:"전력 부호", exp:"수동 부호 규약에서 전류가 + 단자로 들어가고 p>0이면 '전력 흡수'를 의미합니다. p<0이면 전력 공급입니다." },
    { text:"에너지(W)는 순시전력을 시간에 대해 적분한 값이다.", answer:true, tag:"전력 계산", exp:"W = ∫p(t)dt입니다. 단위는 [J] = [Ws]입니다. 에너지는 일(Work)과 동일한 개념입니다." },
    { text:"평균전력(Average Power)은 순시전력을 한 주기 T 동안 시간 평균한 값이다.", answer:true, tag:"전력 계산", exp:"P = (1/T)∫p(t)dt = W/T입니다. 평균전력은 실전력(Real Power)이라고도 하며, AC 회로에서는 유효전력이라고 합니다." },
    { text:"DC 전압원의 평균 흡수 전력은 P_dc = V_dc × I_rms이다.", answer:false, tag:"전력 계산", exp:"DC 전압원의 평균 흡수 전력은 P_dc = V_dc × I_avg입니다. DC 전압원에는 평균 전류(I_avg)를 사용해야 합니다." },
    { text:"주기적인 전류가 흐르는 이상 인덕터의 평균 흡수 전력은 0이다.", answer:true, tag:"인덕터", exp:"주기적 전류에서 인덕터의 저장 에너지는 주기 시작과 끝이 동일하므로 순 에너지 이동이 0입니다. P_L = 0입니다." },
    { text:"인덕터에 주기적인 전류가 흐를 때 한 주기 동안 인덕터 양단의 평균 전압은 0이다.", answer:true, tag:"인덕터", exp:"i(t₀+T)=i(t₀)이면 (L/T)∫v_L dt = 0이므로 평균 전압 V_L = 0입니다. 이를 Volt-Second Balance라 합니다." },
    { text:"커패시터에 주기적인 전압이 걸릴 때 커패시터를 흐르는 평균 전류는 0이다.", answer:true, tag:"커패시터", exp:"v(t₀+T)=v(t₀)이므로 (C/T)∫i_C dt = 0, 즉 평균 전류 I_C = 0입니다. 이를 Amp-Second Balance라 합니다." },
    { text:"주기적인 전압이 걸리는 이상 커패시터의 평균 흡수 전력은 0이 아니다.", answer:false, tag:"커패시터", exp:"이상 커패시터는 에너지를 저장하고 방출할 뿐 소비하지 않습니다. P_C = 0입니다." },
    { text:"실효값(RMS)은 같은 저항에 동일한 평균전력을 공급하는 DC값으로 정의된다.", answer:true, tag:"실효값 RMS", exp:"RMS의 정의입니다. V_rms = √(1/T × ∫v²dt)이며, '제곱의 평균의 제곱근(Root Mean Square)'입니다." },
    { text:"정현파 v(t) = Vm sin(ωt)의 RMS 전압은 Vm/√2이다.", answer:true, tag:"실효값 RMS", exp:"정현파와 전파 정류파의 RMS값은 V_rms = Vm/√2 ≈ 0.707Vm입니다. 220V 가정용 전압의 최댓값은 약 311V입니다." },
    { text:"듀티비 D를 가지는 구형파의 RMS값은 Vm × D이다.", answer:false, tag:"실효값 RMS", exp:"듀티비 D인 구형파의 RMS값은 V_rms = Vm√D입니다. D=1이면 Vm(DC), D=1/4이면 Vm/2입니다." },
    { text:"반파 정류된 정현파의 RMS값은 Vm/2이다.", answer:true, tag:"실효값 RMS", exp:"반파 정류파는 V_rms = Vm/2입니다. 전파 정류(Vm/√2)보다 작습니다." },
    { text:"서로 다른 주파수를 가진 두 정현파의 곱을 한 주기 동안 평균하면 0이 된다.", answer:true, tag:"비정현파 전력", exp:"다른 주파수의 정현파는 직교(Orthogonal)합니다. 평균전력은 같은 주파수 성분끼리만 기여합니다." },
    { text:"피상전력(Apparent Power) S = V_rms × I_rms이며 단위는 VA이다.", answer:true, tag:"전력인수", exp:"피상전력은 S = V_rms × I_rms [VA]입니다. 전원 설비 용량을 나타냅니다." },
    { text:"3상 피상전력은 S = √3 × V_ll,rms × I_l,rms이다.", answer:true, tag:"전력인수", exp:"3상 피상전력 공식입니다. S = 3 × V_rms × I_rms = √3 × V_ll,rms × I_l,rms입니다." },
    { text:"선형 AC 회로에서 역률(Power Factor)은 항상 cos(θ-φ)와 같다.", answer:true, tag:"전력인수", exp:"선형 회로(정현파 전원, 선형 부하)에서는 pf = P/S = cos(θ-φ)입니다." },
    { text:"비선형 부하의 역률은 변위전력인수(DPF)와 왜형률계수(DF)의 곱이다.", answer:true, tag:"비정현파 전력", exp:"비선형 부하에서 pf = DF × DPF입니다. DPF = cos(θ₁-φ₁)은 기본파 위상차, DF = I₁,rms/I_rms는 왜형률계수입니다." },
    { text:"총고조파왜형률(THD)이 클수록 왜형률계수(DF)는 커진다.", answer:false, tag:"비정현파 전력", exp:"DF = 1/√(1+THD²)이므로 THD가 증가할수록 DF는 감소합니다. THD=0이면 DF=1입니다." },
    { text:"서로 다른 주파수의 전압 성분이 여러 개 있을 때, 전체 RMS는 각 성분 RMS의 합이다.", answer:false, tag:"실효값 RMS", exp:"서로 직교하는 성분들의 전체 RMS는 각 성분 RMS의 제곱합의 제곱근입니다. V_rms = √(V₁²+V₂²+...)입니다." },
    { text:"삼각파 전류의 RMS값은 I_m/√3이다.", answer:true, tag:"실효값 RMS", exp:"삼각파의 RMS값은 I_rms = I_m/√3입니다. DC 전력 회로에서 자주 등장하는 파형입니다." },
    { text:"DC 성분이 있는 오프셋 삼각파의 RMS값은 √(I_dc² + (I_m/√3)²)이다.", answer:true, tag:"실효값 RMS", exp:"서로 직교하는 DC 성분과 AC 성분(삼각파)의 RMS는 I_rms = √(I_dc² + (I_m/√3)²)입니다." },
    { text:"비정현파 주기 전압과 전류에서 평균전력은 모든 주파수 성분 쌍의 기여를 합산한다.", answer:false, tag:"비정현파 전력", exp:"평균전력은 같은 주파수 성분끼리만 기여합니다. 다른 주파수 성분 간 교차항은 0입니다." },
    { text:"이상 인덕터에서 순시전력이 0이 아닐 수 있다.", answer:true, tag:"인덕터", exp:"이상 인덕터의 평균 전력은 0이지만, 순시전력은 에너지를 흡수하거나 방출하는 구간에서 0이 아닐 수 있습니다." },
    { text:"역률(Power Factor)이 1이면 부하는 순수 저항성이다.", answer:true, tag:"전력인수", exp:"pf = 1은 전압과 전류가 완전히 동위상임을 의미합니다. 이는 순수 저항(R)에서만 발생합니다." },
    { text:"커패시터는 전압에 비례하는 에너지를 저장하며, 저장 에너지는 (1/2)CV²이다.", answer:true, tag:"커패시터", exp:"커패시터의 저장 에너지 공식입니다. w(t) = (1/2)Cv²(t)이며, 전압의 제곱에 비례합니다." },
    { text:"인덕터는 전류에 비례하는 에너지를 저장하며, 저장 에너지는 (1/2)LI²이다.", answer:true, tag:"인덕터", exp:"인덕터의 저장 에너지 공식입니다. w(t) = (1/2)Li²(t)이며, 전류의 제곱에 비례합니다." },
    { text:"Fourier 급수는 비정현파 주기 파형을 정현파들의 합으로 표현하는 방법이다.", answer:true, tag:"비정현파 전력", exp:"Fourier 급수는 비정현파 주기 함수를 DC 성분과 여러 주파수의 정현파 성분의 합으로 분해합니다." },
    { text:"왜형전력(Distortion Power) D는 전원전압의 기본파와 부하전류의 고조파 성분 사이에서 발생한다.", answer:true, tag:"비정현파 전력", exp:"정현파 전원에 비선형 부하가 연결되면 전류에 고조파가 발생합니다. 피상전력 S = √(P²+Q²+D²)으로 왜형전력 D가 포함됩니다." },
    { text:"형상률(Form Factor)은 RMS 전류를 최댓값 전류로 나눈 값이다.", answer:false, tag:"실효값 RMS", exp:"형상률(Form Factor) = I_rms / I_avg입니다. 파고율(Crest Factor) = I_peak / I_rms입니다. 이 둘을 혼동하지 않도록 주의하세요." },
  ],
  3: [
    { text:"반파 정류기(Half-Wave Rectifier)는 AC의 양의 반주기만 부하에 전달한다.", answer:true, tag:"반파정류기 개요", exp:"반파 정류기는 다이오드 하나로 구성되며, 양의 반주기에만 다이오드가 순방향 바이어스되어 전류가 흐릅니다." },
    { text:"저항 부하 반파 정류기에서 출력 전압의 평균값은 V_o = Vm/π이다.", answer:true, tag:"저항 부하", exp:"V_avg = (1/2π)∫₀^π Vm sin(ωt) d(ωt) = Vm/π입니다. 강의자료에 명시된 공식입니다." },
    { text:"저항 부하 반파 정류기에서 출력 전압의 RMS값은 Vm/π이다.", answer:false, tag:"저항 부하", exp:"저항 부하 반파 정류기의 RMS 전압은 V_rms = Vm/2입니다. 평균값 Vm/π와 구분해야 합니다." },
    { text:"저항 부하 반파 정류기의 역률(Power Factor)은 1/√2 = 0.707이다.", answer:true, tag:"저항 부하", exp:"Ex.3-1에서 pf = P/S ≈ 0.707 = 1/√2임을 확인할 수 있습니다." },
    { text:"RL 부하 반파 정류기에서 인덕터가 있으면 전류는 전원 전압이 0이 된 후에도 계속 흐른다.", answer:true, tag:"RL 부하", exp:"인덕터에 저장된 에너지가 방출되면서 전압이 음이 된 후에도 전류가 지속됩니다. 소호각(β)은 항상 π보다 큽니다." },
    { text:"RL 부하 반파 정류기의 전류는 강제 응답(Forced Response)과 자연 응답(Natural Response)의 합으로 구한다.", answer:true, tag:"RL 부하", exp:"i(t) = i_f(t) + i_n(t)입니다. 강제 응답은 정상상태 정현파 전류, 자연 응답은 Ae^(-t/τ) 형태입니다." },
    { text:"RL 부하 반파 정류기에서 시정수 τ = L/R이 클수록 소호각(β)이 작아진다.", answer:false, tag:"RL 부하", exp:"τ = L/R이 클수록 자연 응답이 천천히 감소하여 전류가 더 오래 흐릅니다. 따라서 소호각 β가 커지고 도통 구간이 길어집니다." },
    { text:"RL 부하 반파 정류기에서 소호각(β, Extinction Angle)은 전류가 0이 되는 각도이다.", answer:true, tag:"RL 부하", exp:"β는 전류가 0으로 돌아오는 각도로, sin(β-θ) + sin(θ)e^(-β/ωτ) = 0을 수치적으로 풀어 구합니다." },
    { text:"RL 소스 부하 반파 정류기에서 다이오드는 AC 전압이 0이 되는 순간 도통을 시작한다.", answer:false, tag:"RL-소스 부하", exp:"AC 전압이 DC 전압(V_dc)보다 높아지는 각도 α = sin⁻¹(V_dc/Vm)에서 도통을 시작합니다." },
    { text:"RL 소스 부하 반파 정류기에서 AC 전원이 공급하는 전력은 P_ac = I²_rms·R + I_o·V_dc이다.", answer:true, tag:"RL-소스 부하", exp:"전력 보존에 의해 AC 전원 공급 전력 = 저항 소비 전력(I²_rms·R) + DC 소스 흡수 전력(I_o·V_dc)입니다." },
    { text:"인덕터-소스 부하 반파 정류기에서 저항이 없으면 AC 전원이 공급하는 전력은 DC 소스가 흡수하는 전력과 같다.", answer:true, tag:"인덕터-소스 부하", exp:"이상적인 인덕터와 다이오드는 에너지를 소비하지 않으므로, AC 전원 공급 전력 = DC 소스 흡수 전력이 됩니다." },
    { text:"프리휠링 다이오드(Freewheeling Diode)는 RL 부하와 병렬로 연결하여 음의 출력 전압을 방지한다.", answer:true, tag:"프리휠링 다이오드", exp:"프리휠링 다이오드(D₂)는 전원이 음이 될 때 도통하여 부하 전압을 0으로 유지합니다." },
    { text:"프리휠링 다이오드가 있는 회로에서 D1과 D2는 동시에 도통될 수 있다.", answer:false, tag:"프리휠링 다이오드", exp:"D1과 D2는 동시에 도통될 수 없습니다. KVL에 의해 하나가 도통되면 나머지는 반드시 역방향 바이어스가 됩니다." },
    { text:"프리휠링 다이오드가 있는 회로에서 부하 전압은 반파 정류된 사인파 형태가 된다.", answer:true, tag:"프리휠링 다이오드", exp:"전원이 양수일 때 v_o = v_s, 음수일 때 v_o = 0이므로 부하 전압은 반파 정류된 사인파입니다." },
    { text:"프리휠링 다이오드가 있는 회로에서 정상 상태 전류는 회로가 처음 켜진 순간부터 바로 나타난다.", answer:false, tag:"프리휠링 다이오드", exp:"회로 처음 켜질 때 부하 전류는 0이며, L/R 시정수에 따라 몇 주기 후 정상 상태(Steady State)에 도달합니다." },
    { text:"커패시터 필터가 있는 반파 정류기에서 커패시터는 다이오드 도통 시 전원으로부터 충전된다.", answer:true, tag:"커패시터 필터", exp:"다이오드가 도통되는 구간에서 v_o = v_s이고, 커패시터는 전원 전압으로 충전됩니다. 최대 Vm까지 충전됩니다." },
    { text:"커패시터 필터 반파 정류기에서 커패시터 용량이 클수록 출력 전압 리플(Ripple)이 작아진다.", answer:true, tag:"커패시터 필터", exp:"ΔV_o ≈ Vm/(fRC)에서 C가 클수록 리플이 작아집니다. 단, C가 커질수록 피크 다이오드 전류가 커집니다." },
    { text:"커패시터 필터 반파 정류기에서 다이오드 평균 전류는 부하 평균 전류보다 크다.", answer:false, tag:"커패시터 필터", exp:"커패시터의 평균 전류는 0이므로, 다이오드 평균 전류 = 부하 저항 평균 전류와 같습니다." },
    { text:"커패시터 필터 반파 정류기에서 다이오드가 꺼지는 각도 θ는 tan(θ) = -ωRC를 만족한다.", answer:true, tag:"커패시터 필터", exp:"다이오드가 꺼지는 순간 전원과 커패시터의 기울기가 같아야 합니다. 이 조건에서 tan(θ) = -ωRC가 유도됩니다." },
    { text:"커패시터 필터 반파 정류기에서 리플 전압은 근사적으로 ΔV_o ≈ Vm/(fRC)이다.", answer:true, tag:"커패시터 필터", exp:"ωRC >> 1인 경우 지수 함수를 급수 전개하면 ΔV_o ≈ Vm/(fRC)로 근사됩니다." },
    { text:"제어형 반파 정류기에서 SCR은 순방향 바이어스와 게이트 신호가 모두 있어야 도통된다.", answer:true, tag:"제어형 정류기", exp:"SCR 도통 조건: ① 순방향 바이어스(V_SCR > 0), ② 게이트 신호 인가. 두 조건이 모두 충족되어야 도통됩니다." },
    { text:"제어형 반파 정류기에서 지연각(α)이 클수록 출력 평균 전압이 높아진다.", answer:false, tag:"제어형 정류기", exp:"V_o = (Vm/2π)(1+cosα)에서 α가 커질수록 cosα가 감소하여 출력 평균 전압이 낮아집니다." },
    { text:"저항 부하 제어형 반파 정류기의 평균 출력 전압은 V_o = (Vm/2π)(1+cosα)이다.", answer:true, tag:"제어형 정류기", exp:"강의자료에 명시된 공식입니다. α는 지연각(Delay Angle)으로, SCR에 게이트 신호가 인가되는 시점입니다." },
    { text:"RL 부하 제어형 반파 정류기에서 도통각(Conduction Angle)은 β-α이다.", answer:true, tag:"제어형 정류기", exp:"도통각은 SCR이 도통되는 구간의 각도로 β-α입니다. β는 소호각, α는 지연각입니다." },
    { text:"제어형 반파 정류기에서 RL 소스 부하의 경우 α_min = sin⁻¹(V_dc/Vm)이다.", answer:true, tag:"제어형 정류기", exp:"SCR은 AC 전압이 DC 전압보다 클 때 순방향 바이어스됩니다. 최소 지연각은 α_min = sin⁻¹(V_dc/Vm)입니다." },
    { text:"반파 정류기 RL 부하에서 θ = tan⁻¹(ωL/R)은 임피던스 Z의 위상각이다.", answer:true, tag:"RL 부하", exp:"Z = √(R²+(ωL)²), θ = tan⁻¹(ωL/R)은 RL 직렬 회로의 임피던스 위상각입니다." },
    { text:"반파 정류기에서 인덕터를 추가하면 출력 전류의 평균값이 항상 감소한다.", answer:false, tag:"RL 부하", exp:"반드시 감소하는 것은 아닙니다. 인덕터는 전류 도통 구간을 늘려(β > π) 평균 전류를 증가시킬 수도 있습니다." },
    { text:"Ex.3-1에서 120Vrms, 60Hz, R=5Ω 조건의 반파 정류기 평균 출력전류는 Vm/(πR)이다.", answer:true, tag:"저항 부하", exp:"V_avg = Vm/π이고 I_avg = V_avg/R = Vm/(πR)입니다. Vm=120√2≈169.7V이면 I_avg ≈ 10.8A입니다." },
    { text:"프리휠링 다이오드 회로에서 출력 전압의 푸리에 급수는 DC 성분, 기본파, 짝수 고조파를 포함한다.", answer:true, tag:"프리휠링 다이오드", exp:"v(t) = Vm/π + (Vm/2)sin(ω₀t) - Σ[2Vm/((n²-1)π)]cos(nω₀t) (n=2,4,6...)로 표현됩니다." },
    { text:"커패시터 필터 반파 정류기에서 커패시터 용량을 늘리면 다이오드 피크 전류가 감소한다.", answer:false, tag:"커패시터 필터", exp:"C가 클수록 리플은 줄지만, 도통 구간이 짧아지고 짧은 시간에 많은 전하를 충전해야 하므로 피크 다이오드 전류는 증가합니다." },
  ],
  4: [
{ text:"브리지 정류기에서 D₁과 D₂는 동시에 도통하고, D₃와 D₄도 동시에 도통한다.", answer:true, tag:"CH4", exp:"KVL에 의해 D₁,D₂ 쌍이 양의 반주기에, D₃,D₄ 쌍이 음의 반주기에 함께 도통한다." },
{ text:"전파 정류기의 출력 전압 기본 주파수는 입력 AC 주파수(ω)와 동일하다.", answer:false, tag:"CH4", exp:"전파 정류기는 입력 1주기당 출력이 2번 발생하므로 기본 주파수는 2ω이다." },
{ text:"브리지 정류기에서 소스 전류의 평균값은 0이다.", answer:true, tag:"CH4", exp:"D₁,D₂ 도통 시와 D₃,D₄ 도통 시 전류 방향이 반대이므로 평균은 0이 된다." },
{ text:"전파 정류기의 RMS 소스 전류는 RMS 부하 전류와 같다.", answer:true, tag:"CH4", exp:"소스 전류의 절댓값은 부하 전류와 동일하므로, 제곱 후 평균을 취해도 동일하다." },
{ text:"저항 부하 전파 정류기에서 평균 출력 전압 Vₒ는 Vm/π이다.", answer:false, tag:"CH4", exp:"전파 정류기의 평균 전압은 Vₒ = 2Vm/π이다. 반파 정류기(Vm/π)의 2배다." },
{ text:"저항 부하 전파 정류기에서 역률(Power Factor)은 1이다.", answer:true, tag:"CH4", exp:"저항 부하일 때 소스 전류는 전압과 동위상인 정현파이므로 역률은 1이다." },
{ text:"중앙 탭 변압기 정류기에서 역방향 바이어스된 다이오드의 최대 역전압(PIV)은 Vm이다.", answer:false, tag:"CH4", exp:"중앙 탭 방식에서 PIV는 2Vm이다. 출력전압 Vm과 반대쪽 권선의 Vm이 더해지기 때문이다." },
{ text:"브리지 정류기는 중앙 탭 변압기 정류기에 비해 고전압 응용에 더 적합하다.", answer:true, tag:"CH4", exp:"브리지 정류기의 PIV는 Vm으로 더 낮아, 고전압 환경에서 다이오드 내압 요구가 낮다." },
{ text:"중앙 탭 변압기 정류기는 소스와 부하 사이에 전기적 절연(isolation)을 제공한다.", answer:true, tag:"CH4", exp:"변압기를 사용하므로 1차측과 2차측이 전기적으로 절연된다." },
{ text:"RL 부하 전파 정류기에서 출력 전압의 푸리에 급수는 DC 항과 짝수 고조파로 구성된다.", answer:true, tag:"CH4", exp:"전파 정류된 정현파는 DC 항, 2ω, 4ω, 6ω... 짝수 고조파만 포함한다." },
{ text:"RL 부하에서 고조파 번호 n이 증가할수록 전류 진폭 Iₙ은 급격히 감소한다.", answer:true, tag:"CH4", exp:"n 증가 시 전압 진폭 Vₙ은 감소하고 임피던스 Zₙ은 증가하여 Iₙ이 빠르게 줄어든다." },
{ text:"RL-소스(배터리) 부하에서 연속 전류 모드(CCM)일 때, DC 평균 전류는 (2Vm/π - Vdc)/R이다.", answer:true, tag:"CH4", exp:"CCM에서 출력전압의 DC 성분은 2Vm/π이며, Vdc를 빼고 R로 나누면 평균 전류가 된다." },
{ text:"불연속 전류 모드(DCM)에서는 전파 정류기의 출력 전압이 정류된 정현파와 일치하지 않는다.", answer:true, tag:"CH4", exp:"DCM에서는 전류가 0인 구간에서 출력 전압이 Vdc 레벨에 머물므로 정류 파형과 다르다." },
{ text:"커패시터 필터를 사용한 전파 정류기의 리플은 반파 정류기에 비해 약 2배 작다.", answer:true, tag:"CH4", exp:"전파 정류기는 반주기마다 충전이 이루어지므로 방전 시간이 짧아 리플이 절반 수준이다." },
{ text:"커패시터 필터 전파 정류기에서 ωRC >> π 조건이면 θ ≈ π/2, α ≈ π/2로 근사한다.", answer:true, tag:"CH4", exp:"C가 매우 크면 피크 근처에서만 도통하므로 역바이어스 각도와 재도통 각도 모두 π/2에 가까워진다." },
{ text:"커패시터 필터 전파 정류기의 근사 리플 전압은 ΔVₒ ≈ Vm/(2fRC)이다.", answer:true, tag:"CH4", exp:"ΔVₒ ≈ Vₘπ/(ωRC) = Vm/(2fRC)로 주파수, R, C가 클수록 리플이 줄어든다." },
{ text:"전압 배증기 회로(Voltage Doubler)는 출력 전압을 Vm/2로 낮춰주는 회로이다.", answer:false, tag:"CH4", exp:"전압 배증기는 C₁, C₂ 각각 Vm씩 충전되어 직렬 합산된 2Vm을 출력한다." },
{ text:"전압 배증기에서 소스가 양수일 때 D₁을 통해 C₁이 Vm으로 충전된다.", answer:true, tag:"CH4", exp:"양의 반주기에 D₁이 도통하여 C₁을 Vm까지 충전시킨다." },
{ text:"제어형 전파 정류기(Controlled Full-Wave Rectifier)에서 지연각 α = 0이면 비제어 정류기와 동일하게 동작한다.", answer:true, tag:"CH4", exp:"α=0이면 SCR이 순방향 바이어스 즉시 도통하므로 다이오드 정류기와 동일하다." },
{ text:"저항 부하 제어형 전파 정류기의 평균 출력 전압은 Vₒ = (Vm/π)(1 + cosα)이다.", answer:true, tag:"CH4", exp:"적분 구간 [α, π]에서 Vm sinωt를 적분하면 (Vm/π)(1+cosα)가 된다." },
{ text:"RL 부하 제어형 전파 정류기에서 연속 전류 조건은 α ≤ tan⁻¹(ωL/R)이다.", answer:true, tag:"CH4", exp:"지연각 α가 임피던스 각도 θ = tan⁻¹(ωL/R)보다 작거나 같아야 연속 전류가 된다." },
{ text:"RL 부하 제어형 전파 정류기에서 β < α + π이면 연속 전류(CCM)이다.", answer:false, tag:"CH4", exp:"β < π + α이면 전류가 다음 SCR 턴온 전에 0이 되므로 불연속 전류(DCM)이다." },
{ text:"연속 전류 CCM에서 제어형 전파 정류기의 출력 DC 전압은 Vₒ = (2Vm/π)cosα이다.", answer:true, tag:"CH4", exp:"CCM에서 적분 구간이 α에서 α+π로 이동하여 (2Vm/π)cosα가 된다." },
{ text:"3상 전파 정류기의 출력 전압 기본 주파수는 6ω이다.", answer:true, tag:"CH4", exp:"3상 브리지에서 6개 다이오드가 순차 도통하여 전원 1주기당 6번의 전환이 발생한다." },
{ text:"3상 전파 정류기에서 항상 상단부 3개 다이오드 중 1개와 하단부 3개 중 1개가 동시에 도통한다.", answer:true, tag:"CH4", exp:"상단에서 양극 전위가 가장 높은 상, 하단에서 음극 전위가 가장 낮은 상의 다이오드가 쌍으로 도통한다." },
{ text:"3상 전파 정류기의 평균 출력 전압은 Vₒ = (3Vm,L-L)/π ≈ 0.955Vm,L-L이다.", answer:true, tag:"CH4", exp:"적분 구간 π/3마다의 선간전압 정현파를 평균하면 3√3Vm,LL/π ≈ 0.955Vm,L-L이다." },
{ text:"3상 정류기에서 다이오드 1개당 평균 전류는 부하 평균 전류의 1/3이다.", answer:true, tag:"CH4", exp:"6개 다이오드가 균등 분담하므로 각 다이오드 도통 시간은 전체의 1/3이다." },
{ text:"3상 정류기의 소스 전류는 이상적인 직류 부하 시 순수 정현파이다.", answer:false, tag:"CH4", exp:"3상 소스 전류는 계단파(구형파 형태)이며, 1차, 5차, 7차, 11차... 고조파가 포함된다." },

// ===================== 상태 변수 =====================
let selectedChapter = null;
let questions = [];
let current = 0;
let score = 0;
let wrong = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function selectChapter(ch) {
  selectedChapter = ch;
  document.querySelectorAll('.ch-btn').forEach((b,i) => {
    b.classList.toggle('selected', i+1===ch);
  });
  const btn = document.getElementById('start-btn');
  btn.classList.add('active');
}

function startHardQuiz() {
  selectedChapter = 'hard';
  questions = shuffle([...HARD_QUESTIONS]);
  current = 0; score = 0; wrong = 0;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('ch-badge').textContent = '🔥 HARD';
  document.getElementById('ch-badge').style.background = 'rgba(249,115,22,0.2)';
  document.getElementById('ch-badge').style.color = '#f97316';
  loadQuestion();
}

function startQuiz() {
  if (!selectedChapter) return;
  questions = shuffle(QUESTIONS[selectedChapter]);
  current = 0; score = 0; wrong = 0;
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('ch-badge').textContent = 'CH' + selectedChapter;
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;
  document.getElementById('progress-text').textContent = `${current+1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((current+1)/total)*100}%`;
  document.getElementById('score-disp').textContent = score;
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-text').textContent = q.text;
  const expBox = document.getElementById('exp-box');
  expBox.style.display='none'; expBox.className='explanation-box';
  const btnO = document.getElementById('btn-o');
  const btnX = document.getElementById('btn-x');
  btnO.disabled=false; btnX.disabled=false;
  btnO.className='answer-btn btn-o'; btnX.className='answer-btn btn-x';
  document.getElementById('next-btn').style.display='none';
}

function answer(userAnswer) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = (userAnswer === q.answer);
  const btnO = document.getElementById('btn-o');
  const btnX = document.getElementById('btn-x');
  btnO.disabled=true; btnX.disabled=true;
  if (correct) {
    score++;
    document.getElementById('score-disp').textContent = score;
    (userAnswer ? btnO : btnX).classList.add('correct');
  } else {
    wrong++;
    if (userAnswer) { btnO.classList.add('wrong'); btnX.classList.add('correct'); }
    else { btnX.classList.add('wrong'); btnO.classList.add('correct'); }
    document.getElementById('question-card').classList.add('shake');
    setTimeout(()=>document.getElementById('question-card').classList.remove('shake'),500);
  }
  const expBox = document.getElementById('exp-box');
  expBox.style.display='block';
  if (correct) {
    expBox.classList.add('correct-exp');
    document.getElementById('exp-title').className='exp-title c';
    document.getElementById('exp-title').textContent='✓ 정답입니다!';
  } else {
    expBox.classList.add('wrong-exp');
    document.getElementById('exp-title').className='exp-title w';
    document.getElementById('exp-title').textContent='✗ 오답. 정답: ' + (q.answer ? 'O' : 'X');
  }
  document.getElementById('exp-text').textContent = q.exp;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display='block';
  nextBtn.textContent = current < questions.length-1 ? '다음 문제 →' : '결과 보기 →';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResult();
  else loadQuestion();
}

function showResult() {
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total = questions.length;
  const rate = Math.round((score/total)*100);
  document.getElementById('r-correct').textContent=score;
  document.getElementById('r-wrong').textContent=wrong;
  document.getElementById('r-rate').textContent=rate+'%';
  document.getElementById('result-big').textContent=score+'점';
  document.getElementById('result-label').textContent=total+'문제 중';
  let emoji,title,sub;
  if(rate>=90){emoji='🏆';title='완벽해요!';sub='CH'+selectedChapter+' 마스터 달성!';}
  else if(rate>=70){emoji='🎉';title='훌륭해요!';sub='핵심 개념을 잘 이해하고 있어요.';}
  else if(rate>=50){emoji='📚';title='조금 더!';sub='강의자료를 다시 복습해보세요.';}
  else{emoji='💪';title='다시 도전!';sub='강의 필기와 예제를 다시 보고 도전해봐요.';}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=sub;
}

function retryQuiz() { startQuiz(); }

function goHome() {
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('title-screen').style.display='block';
  const badge = document.getElementById('ch-badge');
  badge.style.background = ''; badge.style.color = '';
}
